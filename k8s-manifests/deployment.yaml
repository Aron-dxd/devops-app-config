apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: flask-app
          image: arnn019/devops-app:9301f4a60b49c73cc3f7a4826efe94ea2e14edbb
          ports:
            - containerPort: 80
